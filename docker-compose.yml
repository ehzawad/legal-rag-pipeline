name: pipeline

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      PIPELINE_RETRIEVAL_PROVIDER: ${PIPELINE_RETRIEVAL_PROVIDER:-openai}
      PIPELINE_RETRIEVAL_MODE: ${PIPELINE_RETRIEVAL_MODE:-hybrid}
      PIPELINE_INDEX_BACKEND: ${PIPELINE_INDEX_BACKEND:-memory}
      PIPELINE_HYBRID_DENSE_WEIGHT: ${PIPELINE_HYBRID_DENSE_WEIGHT:-0.65}
      PIPELINE_HYBRID_BM25_WEIGHT: ${PIPELINE_HYBRID_BM25_WEIGHT:-0.35}
      PIPELINE_PLAYBOOK_RISK: ${PIPELINE_PLAYBOOK_RISK:-true}
      PIPELINE_PDF_MAX_PAGES: ${PIPELINE_PDF_MAX_PAGES:-30}
      PIPELINE_PDF_RENDER_DPI: ${PIPELINE_PDF_RENDER_DPI:-180}
      PIPELINE_API_ALLOWED_ROOTS: ${PIPELINE_API_ALLOWED_ROOTS:-}
    ports:
      - "8000:8000"
    volumes:
      - ./datasets:/app/datasets:ro
      - ./eval:/app/eval:ro
      - ./outputs:/app/outputs
      - ./state:/app/state
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    command: ["/app/.venv/bin/uvicorn", "pipeline.api:app", "--host", "0.0.0.0", "--port", "8000"]
